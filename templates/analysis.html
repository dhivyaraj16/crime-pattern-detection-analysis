<!DOCTYPE html>
<html>

<head>

    <title>Crime Analysis</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* Background */
body{
    min-height:100vh;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:#222;
}


/* Title */
h1{
    text-align:center;
    margin:25px 0;
    color:#fff;
    font-weight:600;
}


/* Filter */
.filter{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
}

select,button{
    padding:8px 14px;
    border-radius:6px;
    border:none;
    outline:none;
    font-size:14px;
}

select{
    background:#fff;
}

button{
    background:#ff9800;
    color:#fff;
    cursor:pointer;
    font-weight:500;
}

button:hover{
    background:#e68900;
}


/* Total Card */
.card{
    background:#fff;
    width:320px;
    margin:20px auto;
    padding:25px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h1{
    color:#2ecc71;
    margin-top:10px;
}


/* Charts Layout */
.charts{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    padding:20px 40px 50px;
}


/* Chart Box */
.chart-box{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.chart-box:hover{
    transform:translateY(-5px);
}

.chart-box h3{
    text-align:center;
    margin-bottom:15px;
    color:#444;
}


/* Canvas */
canvas{
    max-height:260px;
}


/* Mobile Responsive */
@media(max-width:600px){

    .filter{
        flex-direction:column;
        align-items:center;
    }

    .charts{
        padding:15px;
    }

}

/* Top bar */
.top-bar {
    position: absolute;
    top: 20px;
    right: 30px;
}

/* Button Style */
.back-btn {
    text-decoration: none;
    background: #4CAF50;
    color: white;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
}

.back-btn:hover {
    background: #388E3C;
}


</style>

</head>


<body>


<h1>Crime Analysis Dashboard</h1>
<!-- Top Right Button -->
<div class="top-bar">
    <a href="/dashboard" class="back-btn">⬅ Back to Dashboard</a>
</div>



<!-- FILTER -->
<div class="filter">

<form method="get" action="/analysis">

    <select name="state" id="stateSelect" onchange="loadDistricts()">

        <option value="All">All States</option>

        {% for s in states %}

        <option value="{{s}}" 
        {% if s == selected_state %}selected{% endif %}>
            {{s}}
        </option>

        {% endfor %}

    </select>


    <select name="district" id="districtSelect">

        <option value="All">All Districts</option>

    </select>


    <button type="submit">Apply Filter</button>

</form>

</div>


<!-- TOTAL -->
<div class="card">

    <h2>Total Crimes</h2>

    <h1 style="color:green">{{ total }}</h1>

</div>


<!-- CHARTS -->
<div class="charts">


    <div class="chart-box">
        <h3>Top 5 Crimes</h3>
        <canvas id="barChart"></canvas>
    </div>


    <div class="chart-box">
        <h3>Year-wise Trend</h3>
        <canvas id="lineChart"></canvas>
    </div>


    <div class="chart-box">
        <h3>Least 5 Crimes</h3>
        <canvas id="pieChart"></canvas>
    </div>

</div>


<!-- DATA -->
<span id="topLabels" hidden>{{ topLabels }}</span>
<span id="topValues" hidden>{{ topValues }}</span>

<span id="bottomLabels" hidden>{{ bottomLabels }}</span>
<span id="bottomValues" hidden>{{ bottomValues }}</span>

<span id="years" hidden>{{ years }}</span>
<span id="yearValues" hidden>{{ yearValues }}</span>


<script>

let selectedDistrict = "{{ selected_district }}";


function loadDistricts(){

    let state = document.getElementById("stateSelect").value;

    let districtSelect = document.getElementById("districtSelect");

    districtSelect.innerHTML = "<option>Loading...</option>";


    if(state === "All"){
        districtSelect.innerHTML = "<option value='All'>All Districts</option>";
        return;
    }


    fetch(`/get_districts/${state}`)
    .then(res => res.json())
    .then(data => {

        districtSelect.innerHTML = "<option value='All'>All Districts</option>";

        data.forEach(d => {

            let opt = document.createElement("option");

            opt.value = d;
            opt.text = d;

            if(d === selectedDistrict){
                opt.selected = true;
            }

            districtSelect.appendChild(opt);
        });
    });
}


// Load on refresh
window.onload = loadDistricts;

</script>


<script src="/static/js/analysis.js"></script>

</body>
</html>
